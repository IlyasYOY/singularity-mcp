name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Go version
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Check
        run: make check
